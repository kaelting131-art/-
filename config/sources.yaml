# 信源清单。topic: leak=爆料/内鬼，strength=强度分析（预筛词和 LLM 判定逻辑不同）
forums:
  - name: 鸣潮爆料
    kw: 鸣潮爆料            # 贴吧 URL ?kw= 后的值
    game: 鸣潮
    topic: leak
    enabled: true
  - name: 鸣潮内鬼
    kw: 鸣潮内鬼
    game: 鸣潮
    topic: leak
    enabled: true
  - name: 鸣潮强度
    kw: 鸣潮强度
    game: 鸣潮
    topic: strength
    enabled: true
  - name: 绝区零内鬼
    kw: 绝区零内鬼
    game: 绝区零
    topic: leak
    enabled: true
  - name: 绝区零爆料
    kw: 绝区零爆料
    game: 绝区零
    topic: leak
    enabled: true
  - name: 绝区零强度
    kw: 绝区零强度
    game: 绝区零
    topic: strength
    enabled: true

crawl:
  list_pages_per_round: 2     # 每个吧每轮抓前 N 页列表
  thread_pages_max: 3         # 单帖最多抓前 N 页楼层（防止超长帖拖垮一轮）
  loop_interval_seconds: 600  # --loop 模式每轮间隔
  recheck_window_hours: 48    # 删帖检测：只对最近 N 小时内见过的帖子做存活检查
  detail_recheck_hours: 6     # 老帖详情页重抓间隔：N 小时内抓过就跳过（新帖总是抓）
  scroll_rounds: 5            # 列表页滚动几轮触发虚拟列表加载（每轮 0.8s）
  min_delay_seconds: 1.5      # 每次页面跳转最小间隔，防风控
  max_delay_seconds: 3.5
